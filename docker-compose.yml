networks:
  restaurant-network:
    driver: bridge

volumes:
  mongodb_data:
  mosquitto_data:
  mosquitto_log:

services:

  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: kitchen-mongodb
    environment:
      MONGO_INITDB_DATABASE: kitchen_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - restaurant-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/kitchen_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mosquitto MQTT Broker ────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 mosquitto_sub -h localhost -t health -C 1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Spring Boot ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant-backend
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SSL_KEY_PASSWORD=${SSL_KEY_PASSWORD}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://your-external-postgres-host:5432/restaurant_db}
      - MQTT_BROKER_URL=tcp://mosquitto:1883
    ports:
      - "8080:8080"
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O- https://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Kitchen Microservice Node.js ─────────────────────────
  kitchen-service:
    build:
      context: ./kitchen-service
      dockerfile: Dockerfile
    container_name: kitchen-service
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/kitchen_db
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - restaurant-network