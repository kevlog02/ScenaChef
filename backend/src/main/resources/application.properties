# Server Port and SSL
server.port=8080
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEY_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=restaurant

# Database configurations
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/restaurant_db}
spring.datasource.username=${DB_USERNAME:restaurant_user}
spring.datasource.password=${DB_PASSWORD:SuperSecretPassword123!}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# JWT configurations
jwt.secret=${JWT_SECRET:my_secreto_jwt_muy_largo_y_aleatorio_de_64_caracteres_minimo_para_seguridad_HS256}
jwt.expiration=86400000

# MQTT configurations
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=spring-boot-client
mqtt.topic.order.created=restaurant/orders/created
mqtt.topic.order.status.updated=restaurant/orders/status

# Actuator Health Config (for Docker Health Check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
# Disable SSL check for actuator health if needed or allow in health check curl
