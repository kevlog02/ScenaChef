<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#ea580c" flood-opacity="0.12" />
    </filter>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8f3d" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>

  <!-- Outer circle with shadow -->
  <circle cx="250" cy="250" r="220" fill="#ffffff" stroke="url(#orangeGrad)" stroke-width="12" filter="url(#shadow)" />
  
  <!-- Inner decorative dotted ring -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#7c2d12" stroke-width="4" stroke-dasharray="8 8" opacity="0.35" />
  <circle cx="250" cy="250" r="192" fill="none" stroke="#fed7aa" stroke-width="2" />

  <!-- Chef Hat (Top Center) -->
  <g id="chef-hat" transform="translate(0, -10)">
    <!-- Lobes -->
    <path d="M190,165 C165,150 155,105 185,90 C180,65 215,50 250,65 C285,50 320,65 315,90 C345,105 335,150 310,165 Z" fill="#ffffff" stroke="#431407" stroke-width="10" stroke-linejoin="round" />
    <!-- Lobe folds lines -->
    <path d="M220,155 C210,120 215,90 225,75" fill="none" stroke="#431407" stroke-width="6" stroke-linecap="round" />
    <path d="M280,155 C290,120 285,90 275,75" fill="none" stroke="#431407" stroke-width="6" stroke-linecap="round" />
    <!-- Hat Band -->
    <path d="M195,165 L305,165 L300,190 L200,190 Z" fill="#ea580c" stroke="#431407" stroke-width="10" stroke-linejoin="round" />
    <!-- Band highlights -->
    <line x1="210" y1="178" x2="290" y2="178" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- Crossed Utensils (Fork & Spatula) -->
  <g id="utensils" transform="translate(0, 15)">
    <!-- Spatula (Diagonal Left-to-Right) -->
    <g>
      <!-- Handle -->
      <path d="M180,310 L230,260" stroke="#431407" stroke-width="10" stroke-linecap="round" />
      <path d="M165,325 L180,310" stroke="#7c2d12" stroke-width="16" stroke-linecap="round" />
      <!-- Head -->
      <path d="M230,260 L275,215 L305,245 L260,290 Z" fill="#ffedd5" stroke="#431407" stroke-width="8" stroke-linejoin="round" />
      <!-- Slots -->
      <line x1="250" y1="245" x2="270" y2="225" stroke="#431407" stroke-width="5" stroke-linecap="round" />
      <line x1="260" y1="255" x2="280" y2="235" stroke="#431407" stroke-width="5" stroke-linecap="round" />
    </g>

    <!-- Fork (Diagonal Right-to-Left) -->
    <g>
      <!-- Handle -->
      <path d="M320,310 L270,260" stroke="#431407" stroke-width="10" stroke-linecap="round" />
      <path d="M335,325 L320,310" stroke="#7c2d12" stroke-width="16" stroke-linecap="round" />
      <!-- Head -->
      <path d="M270,260 L225,215 C215,225 215,245 240,270 L245,275 Z" fill="#ffedd5" stroke="#431407" stroke-width="8" stroke-linejoin="round" />
      <!-- Tines slots -->
      <path d="M245,230 L225,250" stroke="#431407" stroke-width="5" stroke-linecap="round" />
      <path d="M255,240 L235,260" stroke="#431407" stroke-width="5" stroke-linecap="round" />
    </g>
  </g>

  <!-- Central Dish / Food (Gourmet Toast/Bruschetta) -->
  <g id="dish" transform="translate(0, 10)">
    <!-- Board/Plate -->
    <ellipse cx="250" cy="305" rx="140" ry="40" fill="#fed7aa" stroke="#7c2d12" stroke-width="10" />
    <ellipse cx="250" cy="300" rx="130" ry="35" fill="#ffedd5" stroke="#431407" stroke-width="6" />

    <!-- Bread/Food Shape -->
    <path d="M160,295 C160,275 340,275 340,295 C340,315 160,315 160,295 Z" fill="#ea580c" stroke="#431407" stroke-width="8" stroke-linejoin="round" />
    <!-- Cheese / Melted Layer -->
    <path d="M175,292 C185,283 315,283 325,292 C325,302 175,302 175,292 Z" fill="#fef08a" />
    <!-- Toppings (Beans & Diced Tomatoes) -->
    <!-- Tomatoes (Red squares/dots) -->
    <rect x="200" y="287" width="12" height="12" rx="3" fill="#ef4444" stroke="#431407" stroke-width="3" />
    <rect x="240" y="291" width="10" height="10" rx="3" fill="#ef4444" stroke="#431407" stroke-width="3" />
    <rect x="280" y="286" width="12" height="12" rx="3" fill="#ef4444" stroke="#431407" stroke-width="3" />
    <rect x="220" y="293" width="9" height="9" rx="2" fill="#ef4444" stroke="#431407" stroke-width="3" />
    <rect x="265" y="288" width="11" height="11" rx="3" fill="#ef4444" stroke="#431407" stroke-width="3" />
    <!-- Beans/Chili (Brown circles) -->
    <circle cx="190" cy="295" r="7" fill="#7c2d12" stroke="#431407" stroke-width="3" />
    <circle cx="210" cy="297" r="6" fill="#7c2d12" stroke="#431407" stroke-width="3" />
    <circle cx="230" cy="295" r="7" fill="#7c2d12" stroke="#431407" stroke-width="3" />
    <circle cx="255" cy="298" r="6" fill="#7c2d12" stroke="#431407" stroke-width="3" />
    <circle cx="278" cy="294" r="7" fill="#7c2d12" stroke="#431407" stroke-width="3" />
    <circle cx="300" cy="297" r="6" fill="#7c2d12" stroke="#431407" stroke-width="3" />
    <circle cx="315" cy="294" r="7" fill="#7c2d12" stroke="#431407" stroke-width="3" />
  </g>

  <!-- Three Stars (Bottom Center) -->
  <g id="stars" transform="translate(0, 10)">
    <!-- Center Star -->
    <polygon points="250,375 254,387 266,387 257,395 260,407 250,399 240,407 243,395 234,387 246,387" fill="#ea580c" stroke="#431407" stroke-width="4" stroke-linejoin="round" />
    <!-- Left Star -->
    <polygon points="210,380 213,390 223,390 215,397 217,407 210,400 203,407 205,397 197,390 207,390" fill="#ea580c" stroke="#431407" stroke-width="4" stroke-linejoin="round" transform="rotate(-15, 210, 395)" />
    <!-- Right Star -->
    <polygon points="290,380 293,390 303,390 295,397 297,407 290,400 283,407 285,397 277,390 287,390" fill="#ea580c" stroke="#431407" stroke-width="4" stroke-linejoin="round" transform="rotate(15, 290, 395)" />
  </g>
</svg>
