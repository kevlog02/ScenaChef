<div class="h-full flex flex-col justify-between">
  <div class="space-y-6">
    <div class="flex items-center justify-between pb-4 border-b border-slate-100">
      <h2 class="text-xl font-bold text-slate-800">{{ isEdit() ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
      <button (click)="cancel()" class="text-slate-400 hover:text-slate-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form #userForm="ngForm" class="space-y-4">
      <div>
        <label for="name" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Nombre Completo</label>
        <input type="text" id="name" name="name" [(ngModel)]="user.name" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-100 outline-none text-sm text-slate-800 placeholder-slate-400" placeholder="Ej. Juan Pérez" />
      </div>

      <div>
        <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Nombre de Usuario</label>
        <input type="text" id="username" name="username" [(ngModel)]="user.username" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-100 outline-none text-sm text-slate-800 placeholder-slate-405 font-mono" placeholder="Ej. jperez" />
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Contraseña @if (isEdit()) { <span class="text-[10px] text-slate-400 font-normal lowercase">(dejar vacío para no cambiar)</span> }</label>
        <input type="password" id="password" name="password" [(ngModel)]="user.password" [required]="!isEdit()" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-100 outline-none text-sm text-slate-800 placeholder-slate-400" placeholder="••••••••" />
      </div>

      <div>
        <label for="role" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Rol del Usuario</label>
        <select id="role" name="role" [(ngModel)]="user.role" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-100 outline-none text-sm text-slate-800">
          <option value="ADMIN">Administrador (ADMIN)</option>
          <option value="CAJERO">Cajero (CAJERO)</option>
          <option value="COCINERO">Cocinero (COCINERO)</option>
        </select>
      </div>

      <div class="flex items-center justify-between pt-2">
        <div>
          <span class="block text-sm font-medium text-slate-700">Usuario Activo</span>
          <span class="block text-xs text-slate-400">Permitir inicio de sesión</span>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" name="active" [(ngModel)]="user.active" class="sr-only peer" />
          <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-600"></div>
        </label>
      </div>

      @if (errorMessage()) {
        <div class="p-3 bg-red-50 border border-red-100 text-red-700 text-xs rounded-xl">{{ errorMessage() }}</div>
      }
    </form>
  </div>

  <div class="flex items-center gap-3 pt-6 border-t border-slate-100 mt-8">
    <button type="button" (click)="cancel()" class="flex-1 py-2.5 border border-slate-200 hover:bg-slate-50 font-semibold text-sm text-slate-750 rounded-xl transition">Cancelar</button>
    <button type="button" (click)="save()" [disabled]="loading() || !userForm.form.valid" class="flex-1 py-2.5 bg-orange-600 hover:bg-orange-500 font-semibold text-sm text-white rounded-xl transition disabled:opacity-50">{{ loading() ? 'Guardando...' : 'Guardar' }}</button>
  </div>
</div>
