<div class="space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-3xl font-extrabold tracking-tight">Gestión de Usuarios</h1>
      <p class="text-sm text-gray-400">Crea, edita y elimina los usuarios del sistema</p>
    </div>
    <button (click)="openCreateForm()" class="inline-flex items-center gap-2 px-4 py-2.5 bg-purple-600 hover:bg-purple-500 font-semibold text-sm rounded-xl transition duration-150 shadow-lg shadow-purple-500/10">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
      <span>Nuevo Usuario</span>
    </button>
  </div>

  <div class="bg-[#141822] border border-white/10 rounded-2xl overflow-hidden shadow-xl">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse text-sm">
        <thead>
          <tr class="bg-[#1e2538]/50 border-b border-white/10 text-gray-400 font-semibold uppercase tracking-wider text-xs">
            <th class="p-4">ID</th>
            <th class="p-4">Nombre</th>
            <th class="p-4">Usuario</th>
            <th class="p-4">Rol</th>
            <th class="p-4">Estado</th>
            <th class="p-4 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-white/5">
          <tr *ngFor="let user of users()" class="hover:bg-white/2 transition">
            <td class="p-4 font-mono text-xs text-gray-400">#{{ user.id }}</td>
            <td class="p-4"><span class="font-medium text-white">{{ user.name }}</span></td>
            <td class="p-4 font-mono text-gray-400">{{ user.username }}</td>
            <td class="p-4">
              <span [ngClass]="{
                'bg-red-500/10 text-red-400 border border-red-500/15': user.role === 'ADMIN',
                'bg-blue-500/10 text-blue-400 border border-blue-500/15': user.role === 'CAJERO',
                'bg-green-500/10 text-green-400 border border-green-500/15': user.role === 'COCINERO'
              }" class="px-2.5 py-1 text-xs font-semibold rounded-lg uppercase">{{ user.role }}</span>
            </td>
            <td class="p-4">
              <span [ngClass]="user.active ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/15' : 'bg-gray-500/10 text-gray-400 border border-gray-500/15'" class="inline-flex items-center gap-1.5 px-2 py-0.5 text-xs font-semibold rounded-md border">
                <span class="w-1.5 h-1.5 rounded-full" [ngClass]="user.active ? 'bg-emerald-400' : 'bg-gray-400'"></span>
                {{ user.active ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="p-4 text-right">
              <div class="inline-flex items-center gap-2">
                <button (click)="openEditForm(user)" class="p-2 text-gray-400 hover:text-purple-400 hover:bg-purple-500/10 rounded-lg transition" title="Editar">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                </button>
                <button (click)="deleteUser(user)" class="p-2 text-gray-400 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition" title="Eliminar">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="users().length === 0"><td colspan="6" class="p-8 text-center text-gray-500">No hay usuarios registrados en el sistema</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="showForm()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-end transition-opacity duration-300" (click)="closeForm()">
    <div class="w-full max-w-md bg-[#141822] h-full border-l border-white/10 p-6 overflow-y-auto shadow-2xl flex flex-col justify-between" (click)="$event.stopPropagation()">
      <app-user-form [selectedUser]="selectedUser()" (saved)="onFormSaved()" (cancelled)="closeForm()"></app-user-form>
    </div>
  </div>
</div>
