<div class="relative min-h-screen flex items-center justify-center bg-slate-50 overflow-hidden text-slate-800 font-sans">
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-orange-500/10 rounded-full blur-[100px] animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-amber-500/10 rounded-full blur-[120px] animate-bounce duration-[10s]"></div>

  <div class="relative w-full max-w-md p-8 mx-4 bg-white/90 backdrop-blur-xl border border-slate-100 rounded-2xl shadow-xl z-10 transition-all">
    <div class="text-center mb-8">
      <div class="inline-flex p-2 bg-white border border-slate-100 rounded-3xl mb-4 shadow-xs">
        <img src="logo.svg" alt="ScenaChef Logo" class="h-28 w-28 object-contain" />
      </div>
      <h2 class="text-2xl font-black tracking-tight text-orange-600">ScenaChef</h2>
      <p class="text-sm text-slate-500 mt-1">Ingresa tus credenciales para acceder</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
      <div>
        <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Usuario</label>
        <div class="relative">
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="username"
            required
            class="w-full pl-4 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-100 outline-none transition text-sm text-slate-800 placeholder-slate-400"
            placeholder="Ej. admin"
          />
        </div>
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Contraseña</label>
        <div class="relative">
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            class="w-full pl-4 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-100 outline-none transition text-sm text-slate-800 placeholder-slate-400"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div *ngIf="errorMessage()" class="p-3 bg-red-50 border border-red-100 text-red-700 text-xs rounded-xl flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500 shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>

      <button
        type="submit"
        [disabled]="loading() || !loginForm.form.valid"
        class="w-full py-3 px-4 bg-orange-600 hover:bg-orange-500 disabled:bg-orange-600/40 disabled:cursor-not-allowed font-semibold text-sm text-white rounded-xl shadow-lg shadow-orange-500/15 hover:shadow-orange-500/25 transition-all flex justify-center items-center gap-2"
      >
        <span *ngIf="loading()" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        <span>{{ loading() ? 'Iniciando sesión...' : 'Entrar' }}</span>
      </button>
    </form>
  </div>
</div>
